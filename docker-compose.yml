version: '3.8'

services:
  postgres:
    #image: postgres:latest
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: testDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
#    healthcheck:
#      test: [ "CMD-SHELL", "pg_isready -U user" ]
#      interval: 5s
#      retries: 5

  app:
    build: .
    image: jan/springboot-api:latest
    container_name: springboot-app
    depends_on:
      - postgres
#      postgres:
#        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker

volumes:
  postgres_data: